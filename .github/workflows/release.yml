name: Release

on:
  push:
    tags:
      - 'v*' # 推送 v1.0.0 等标签时触发

# 【新增】：全局环境变量，强制要求所有 JavaScript Action 使用 Node.js 24 运行，消除 Node.js 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 并发策略：如果同一个 tag 触发了多次，自动取消之前的构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write # 必须：允许创建 Release 和上传附件
    strategy:
      fail-fast: false # 即使某个系统构建失败，其他系统也会继续完成
      matrix:
        # 优化：使用 ubuntu-24.04，macOS-latest 在 2026 年通常指代 M2/M3 芯片环境
        platform: [macos-latest, ubuntu-24.04, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 配置 Node.js 环境（启用 npm 缓存）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      # 2. 配置 Rust 环境（启用 Rust 缓存）
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # 增加编译目标支持（如果是 Mac 则自动处理 aarch64）
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 3. Linux 专属依赖环境（针对 Ubuntu 24.04 优化）
      - name: Install dependencies (Ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # 4. 安装前端依赖
      - name: Install frontend dependencies
        run: npm install

      # 5. Tauri 官方构建 Action
      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 自动使用触发构建的 Tag 名称
          tagName: ${{ github.ref_name }}
          releaseName: 'Serial Tool ${{ github.ref_name }}'
          releaseBody: |
            ## 🚀 自动编译发布
            - 版本: ${{ github.ref_name }}
            - 日期: ${{ github.event.head_commit.timestamp }}
            - 提交信息: ${{ github.event.head_commit.message }}
            
            请在下方根据你的操作系统下载对应的安装包：
            - Windows: `.msi` 或 `.exe`
            - macOS: `.dmg` 或 `.app`
            - Linux: `.deb` 或 `AppImage`
          releaseDraft: false
          prerelease: false
